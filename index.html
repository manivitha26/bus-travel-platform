<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BusVoyager — Plan bus routes, share travel stories, read verified reviews, and connect with the bus travel community. Your next adventure starts here.">
  <meta name="keywords" content="bus travel, route planner, travel community, bus reviews, trip planning">
  <meta name="author" content="BusVoyager">
  <meta name="theme-color" content="#6366f1">
  <title>BusVoyager — Plan, Share & Explore Bus Travel</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Favicon (inline SVG bus emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity 0.3s">
    <div style="font-size:3rem;animation:float 2s ease-in-out infinite">🚌</div>
    <div class="spinner"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="main-navbar">
    <div class="navbar-inner">
      <!-- Brand -->
      <a class="navbar-brand" href="#home" onclick="App.navigate('home')">
        <div class="brand-icon">🚌</div>
        <span>BusVoyager</span>
      </a>

      <!-- Nav Links -->
      <div class="navbar-nav" id="mobile-nav">
        <a class="nav-link active" data-page="home" href="#home" data-i18n="nav.home">Home</a>
        <a class="nav-link" data-page="community" href="#community" data-i18n="nav.community">Community</a>
        <a class="nav-link" data-page="routes" href="#routes" data-i18n="nav.routes">Route Planner</a>
        <a class="nav-link" data-page="reviews" href="#reviews" data-i18n="nav.reviews">Reviews</a>
      </div>

      <!-- Actions -->
      <div class="navbar-actions">
        <!-- Language Selector -->
        <div class="dropdown">
          <button class="nav-icon-btn" id="lang-btn" data-tooltip="Language">
            🌐
          </button>
          <div class="dropdown-menu" id="lang-dropdown" style="min-width:180px">
            <!-- Populated by I18n -->
          </div>
        </div>

        <!-- Theme Toggle -->
        <button class="nav-icon-btn theme-toggle" onclick="Theme.toggle()" data-tooltip="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>

        <!-- Notifications -->
        <div class="dropdown">
          <button class="nav-icon-btn" id="notification-btn" data-tooltip="Notifications">
            🔔
            <span class="notification-badge" id="notification-badge" style="display:none">0</span>
          </button>
          <div class="dropdown-menu" id="notification-dropdown" style="min-width:320px;max-height:400px;overflow-y:auto">
            <div style="padding:0.75rem;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center">
              <span class="font-semibold text-sm" data-i18n="notifications.title">Notifications</span>
              <a href="#notifications" class="text-xs" style="color:var(--primary-500)">View all</a>
            </div>
            <div id="notification-dropdown-list"></div>
          </div>
        </div>

        <!-- Auth Buttons / User Menu -->
        <div id="auth-buttons" class="flex gap-2" style="display:flex">
          <a href="#login" class="btn btn-ghost btn-sm" data-i18n="nav.login">Log In</a>
          <a href="#register" class="btn btn-primary btn-sm" data-i18n="nav.register">Sign Up</a>
        </div>

        <div id="user-menu" class="dropdown" style="display:none">
          <button class="avatar" id="user-avatar" id="user-menu-btn" style="cursor:pointer;font-size:0.8rem" onclick="document.getElementById('user-dropdown').classList.toggle('open')">
          </button>
          <div class="dropdown-menu" id="user-dropdown">
            <div style="padding:0.75rem;border-bottom:1px solid var(--border-light)">
              <div class="font-semibold text-sm" id="user-name"></div>
            </div>
            <a class="dropdown-item" href="#profile">👤 <span data-i18n="nav.profile">Profile</span></a>
            <a class="dropdown-item" href="#settings">⚙️ <span data-i18n="nav.settings">Settings</span></a>
            <a class="dropdown-item" href="#notifications">🔔 <span data-i18n="nav.notifications">Notifications</span></a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" onclick="Auth.logout()" style="color:var(--danger-500)">🚪 <span data-i18n="nav.logout">Log Out</span></div>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
      </div>
    </div>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Content -->
  <main id="app-content">
    <div class="page active" id="page-home"></div>
    <div class="page" id="page-community"></div>
    <div class="page" id="page-routes"></div>
    <div class="page" id="page-reviews"></div>
    <div class="page" id="page-notifications"></div>
    <div class="page" id="page-profile"></div>
    <div class="page" id="page-settings"></div>
    <div class="page" id="page-login"></div>
    <div class="page" id="page-register"></div>
  </main>

  <!-- ============================================================
       MODALS
       ============================================================ -->

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="modal-create-post">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="community.create_post">Create Post</h3>
        <button class="modal-close" onclick="Utils.closeModal('modal-create-post')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Forum</label>
        <select class="form-select" id="new-post-forum">
          <option value="general" data-i18n="community.forum_general">General</option>
          <option value="routes" data-i18n="community.forum_routes">Routes Discussion</option>
          <option value="destinations" data-i18n="community.forum_destinations">Destinations</option>
          <option value="tips" data-i18n="community.forum_tips">Travel Tips</option>
        </select>
      </div>
      <div class="form-group">
        <textarea class="form-textarea" id="new-post-content" rows="5" placeholder="Share your travel experience, tips, or questions..." data-i18n-placeholder="community.create_post" style="min-height:150px"></textarea>
      </div>
      <div class="flex justify-end gap-3">
        <button class="btn btn-secondary" onclick="Utils.closeModal('modal-create-post')" data-i18n="common.cancel">Cancel</button>
        <button class="btn btn-primary" onclick="Community.submitPost()" data-i18n="community.post_btn">Post</button>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div class="modal-overlay" id="modal-report">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="community.report">Report</h3>
        <button class="modal-close" onclick="Utils.closeModal('modal-report')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="community.report_reason">Reason for reporting</label>
        <select class="form-select" id="report-reason">
          <option value="spam" data-i18n="community.report_spam">Spam</option>
          <option value="offensive" data-i18n="community.report_offensive">Offensive content</option>
          <option value="misinformation" data-i18n="community.report_misinformation">Misinformation</option>
          <option value="other" data-i18n="community.report_other">Other</option>
        </select>
      </div>
      <div class="flex justify-end gap-3">
        <button class="btn btn-secondary" onclick="Utils.closeModal('modal-report')" data-i18n="common.cancel">Cancel</button>
        <button class="btn btn-danger" onclick="Community.submitReport()" data-i18n="community.report_submit">Submit Report</button>
      </div>
    </div>
  </div>

  <!-- Write Review Modal -->
  <div class="modal-overlay" id="modal-write-review">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="reviews.write_review">Write a Review</h3>
        <button class="modal-close" onclick="Utils.closeModal('modal-write-review')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="reviews.your_rating">Your Rating</label>
        <div class="star-rating">
          <input type="radio" name="rating" value="5" id="rating-5"><label for="rating-5">★</label>
          <input type="radio" name="rating" value="4" id="rating-4"><label for="rating-4">★</label>
          <input type="radio" name="rating" value="3" id="rating-3"><label for="rating-3">★</label>
          <input type="radio" name="rating" value="2" id="rating-2"><label for="rating-2">★</label>
          <input type="radio" name="rating" value="1" id="rating-1"><label for="rating-1">★</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="reviews.review_text">Your Review</label>
        <textarea class="form-textarea" id="review-text-input" rows="5" placeholder="Share your experience on this route... (minimum 50 characters)" data-i18n-placeholder="reviews.review_placeholder" style="min-height:120px"></textarea>
        <div class="form-hint" data-i18n="reviews.min_chars">Minimum 50 characters required</div>
      </div>
      <div class="flex justify-end gap-3">
        <button class="btn btn-secondary" onclick="Utils.closeModal('modal-write-review')" data-i18n="common.cancel">Cancel</button>
        <button class="btn btn-primary" onclick="Reviews.submitReview()" data-i18n="reviews.submit">Submit Review</button>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App JS (order matters) -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/community.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/routes.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
